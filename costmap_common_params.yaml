#机器人几何参，如果机器人是圆形，设置 robot_radius,如果是其他形状设置 footprint
robot_radius: 0.16 #圆形
# footprint: [[-0.26, -0.19], [-0.26, 0.19], [0.26, 0.19], [0.26, -0.19]] #其他形状
# 四个角的坐标


obstacle_range: 2.5 # 用于障碍物探测
raytrace_range: 3.0 # 用于清除障碍物


#膨胀半径，扩展在碰撞区域以外的代价区域，使得机器人规划路径避开障碍物
inflation_radius: 0.25
#代价比例系数，越大则代价值越小
cost_scaling_factor: 8.0

#地图类型
map_type: costmap

#导航包所需要的传感器
observation_sources: scan
#对传感器的坐标系和数据进行配置。这个也会用于代价地图添加和清除障碍物。例如，你可以用激光雷达传感器用于在代价地图添加障碍物，再添加kinect用于导航和清除障碍物。
scan: {sensor_frame: livox_frame, data_type: LaserScan, topic: /rflysim/sensor0/vehicle_lidar_points, marking: true, clearing: true,    filter_window_size: 1,
    min_obstacle_height: -1.0,
    max_obstacle_height: 2.0}
